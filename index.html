<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabla PRO</title>

<style>
body{font-family:Arial;background:#0f0f0f;color:white;margin:0;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th,td{border:1px solid #333;padding:5px;text-align:center;}
input,select{width:100%;background:#1a1a1a;color:white;border:none;padding:5px;border-radius:5px;}
img{width:45px;height:45px;border-radius:6px;margin:2px;}
.galeria img{width:60px;height:60px;cursor:pointer;}
button{padding:8px;border:none;color:white;border-radius:6px;font-weight:bold;}

.barra{
position:sticky;
top:0;
z-index:999;
background:#0f0f0f;
padding:10px;
border-bottom:1px solid #333;
display:flex;
gap:5px;
}
</style>
</head>

<body>

<div class="barra">

<select id="mes">
<option>Enero</option>
<option>Febrero</option>
<option>Marzo</option>
<option>Abril</option>
<option>Mayo</option>
<option>Junio</option>
<option>Julio</option>
<option>Agosto</option>
<option>Septiembre</option>
<option>Octubre</option>
<option>Noviembre</option>
<option>Diciembre</option>
</select>

<button onclick="guardar()" style="background:#00c853;">💾 Guardar</button>
<button onclick="agregarFila()" style="background:#2196f3;">➕</button>

</div>

<h2 style="padding:10px;">📈 TABLA</h2>

<table id="tabla">
<thead>
<tr>
<th>Img1</th>
<th>Img2</th>
<th>Nombre</th>
<th>Invertido</th>
<th>Venta</th>
<th>Cant</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2 style="padding:10px;">🖼️ Catálogo</h2>

<h3 style="padding-left:10px;">👨 Hombre</h3>
<div id="cat_h" class="galeria"></div>

<h3 style="padding-left:10px;">👩 Mujer</h3>
<div id="cat_m" class="galeria"></div>

<h3 style="padding-left:10px;">💑 Pareja</h3>
<div id="cat_p" class="galeria"></div>

<h3 style="padding-left:10px;">📦 Otros</h3>
<div id="cat_o" class="galeria"></div>

<script>

const URL="https://script.google.com/macros/s/AKfycbwSd49G63Ewrtdph-RyRwgqd1ePUui4Q5Vi3CrfiGOESnG07-ABHwwkC5lepjQzlYtFDg/exec";

let tabla=document.querySelector("#tabla tbody");
let inputActivo=null;

// detectar input activo
document.addEventListener("focusin",e=>{
if(e.target.classList.contains("imginput")){
inputActivo=e.target;
}
});

// 🔥 formato 10.000
function formatearNumero(valor){
valor = valor.replace(/\./g,"").replace(/\D/g,"");
return valor.replace(/\B(?=(\d{3})+(?!\d))/g,".");
}

function limpiarNumero(valor){
return Number(valor.replace(/\./g,""));
}

function agregarFila(){
let f=tabla.insertRow();

f.innerHTML=`
<td><input class="imginput"><br><img></td>
<td><input class="imginput"><br><img></td>
<td><input placeholder="Nombre"></td>
<td><input class="numero" placeholder="Invertido"></td>
<td><input class="numero" placeholder="Venta"></td>
<td><input type="number" value="1"></td>
`;

// preview imágenes
f.querySelectorAll(".imginput").forEach((inp,i)=>{
inp.oninput=e=>{
f.querySelectorAll("img")[i].src=e.target.value;
};
});

// formato números
f.querySelectorAll(".numero").forEach(inp=>{
inp.oninput=e=>{
let cursor = e.target.selectionStart;
e.target.value = formatearNumero(e.target.value);
e.target.setSelectionRange(cursor,cursor);
};
});

}

// 🔥 CATALOGO AUTOMÁTICO
fetch("https://api.github.com/repos/kaleth77/kpreloj/contents/img")
.then(res=>res.json())
.then(data=>{
data.forEach(file=>{
if(file.type==="file"){

let nombre=file.name;
let url=file.download_url;
let categoria="cat_o";

if(nombre.startsWith("relojcurrenh")) categoria="cat_h";
else if(nombre.startsWith("relojcurrenm")) categoria="cat_m";
else if(nombre.startsWith("relojcurrenp")) categoria="cat_p";
else if(nombre.startsWith("relojcurreno")) categoria="cat_o";

let img=document.createElement("img");
img.src=url;

img.onclick=()=>{
if(inputActivo){
inputActivo.value=url;
inputActivo.dispatchEvent(new Event("input"));
}
};

document.getElementById(categoria).appendChild(img);

}
});
});

// 🔥 GUARDAR
function guardar(){

let productos=[];

for(let f of tabla.rows){

let invertido = limpiarNumero(f.cells[3].children[0].value);
let venta = limpiarNumero(f.cells[4].children[0].value);
let cant = Number(f.cells[5].children[0].value);

let total = venta * cant;
let ganancia = total - (invertido * cant);
let porcentaje = (ganancia / (invertido * cant)) * 100;

productos.push([
f.cells[0].children[0].value, // Img1
f.cells[1].children[0].value, // Img2
f.cells[2].children[0].value, // nombre
document.getElementById("mes").value, // Mes
invertido, // E
total,     // F (vendido)
ganancia,  // G
]);
}

fetch(URL,{
method:"POST",
body:JSON.stringify({datos:productos})
})
.then(()=>alert("Guardado 🔥"))
.catch(()=>alert("Error ❌"));

}

agregarFila();

</script>

</body>
</html>
