<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabla PRO</title>

<style>
body{font-family:Arial;margin:0;padding:10px;background:#0f0f0f;color:white;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th,td{border:1px solid #333;padding:5px;text-align:center;}
input{width:100%;background:#1a1a1a;color:white;border:none;padding:5px;}
img{width:45px;height:45px;border-radius:6px;margin:2px;}
button{width:100%;padding:10px;margin-top:10px;background:#00c853;border:none;color:white;}
.galeria img{width:60px;height:60px;cursor:pointer;}
.categoria{margin-top:15px;}
</style>
</head>

<body>

<h2>📈 TABLA</h2>

<table id="tabla">
<thead>
<tr>
<th>Img1</th>
<th>Img2</th>
<th>Producto</th>
<th>Costo</th>
<th>Venta</th>
<th>Cant</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button onclick="agregarFila()">➕ Agregar</button>

<h2>🖼️ Catálogo</h2>

<div class="categoria">
<h3>👨 Hombre</h3>
<div id="cat_h" class="galeria"></div>
</div>

<div class="categoria">
<h3>👩 Mujer</h3>
<div id="cat_m" class="galeria"></div>
</div>

<div class="categoria">
<h3>💑 Pareja</h3>
<div id="cat_p" class="galeria"></div>
</div>

<div class="categoria">
<h3>📦 Otros</h3>
<div id="cat_o" class="galeria"></div>
</div>

<script>

const BASE="https://raw.githubusercontent.com/kaleth77/kpreloj/main/";

let tabla=document.querySelector("#tabla tbody");
let inputActivo=null;

// 🔥 Detectar input activo
document.addEventListener("focusin",e=>{
if(e.target.classList.contains("imginput")){
inputActivo=e.target;
}
});

function agregarFila(){
let f=tabla.insertRow();

f.innerHTML=`
<td>
<input class="imginput">
<br>
<img class="img1">
</td>

<td>
<input class="imginput">
<br>
<img class="img2">
</td>

<td><input></td>
<td><input></td>
<td><input></td>
<td><input type="number" value="1"></td>
`;

f.querySelectorAll(".imginput").forEach((inp,i)=>{
inp.oninput=e=>{
f.querySelectorAll("img")[i].src=BASE+e.target.value;
};
});
}

// 🔥 Crear catálogo automático por rango
function crearCatalogo(prefijo, contenedor, max=120){
for(let i=1;i<=max;i++){
let nombres=[
`${prefijo}${i}.jpg`,
`${prefijo}${i}.jpeg`,
`${prefijo}${i}.JPG`,
`${prefijo}${i}.JPEG`
];

nombres.forEach(nombre=>{
let img=new Image();
img.src=BASE+nombre;

img.onload=()=>{
let mini=document.createElement("img");
mini.src=img.src;

mini.onclick=()=>{
if(inputActivo){
inputActivo.value=nombre;
inputActivo.dispatchEvent(new Event("input"));
}
};

contenedor.appendChild(mini);
};
});
}
}

// 🔥 Crear categorías
crearCatalogo("relojcurrenh",document.getElementById("cat_h"));
crearCatalogo("relojcurrenm",document.getElementById("cat_m"));
crearCatalogo("relojcurrenp",document.getElementById("cat_p"));
crearCatalogo("relojcurreno",document.getElementById("cat_o"));

// Primera fila
agregarFila();

</script>

</body>
</html>
