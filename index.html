<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KP Admin - Registro Real</title>

<style>
body{font-family:Arial;background:#0f0f0f;color:white;margin:0;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th,td{border:1px solid #333;padding:5px;text-align:center;}
input,select{width:100%;background:#1a1a1a;color:white;border:none;padding:5px;border-radius:5px;}
img{width:45px;height:45px;border-radius:6px;margin:2px;background:#333;}
.galeria img{width:60px;height:60px;cursor:pointer;}
button{padding:8px;border:none;color:white;border-radius:6px;font-weight:bold;}

.barra{
position:sticky;
top:0;
z-index:999;
background:#0f0f0f;
padding:10px;
border-bottom:1px solid #333;
display:flex;
gap:5px;
}

.enviado {
    background: #004d40 !important;
    opacity: 0.8;
}
.enviado input {
    pointer-events: none;
    color: #aaa;
}
</style>
</head>

<body>

<div class="barra">
<select id="mes">
<option>Enero</option><option>Febrero</option><option>Marzo</option><option>Abril</option>
<option>Mayo</option><option>Junio</option><option>Julio</option><option>Agosto</option>
<option>Septiembre</option><option>Octubre</option><option>Noviembre</option><option>Diciembre</option>
</select>
<select id="anio">
<option>2026</option>
<option>2027</option>
<option>2028</option>
<option>2029</option>
<option>2030</option>
</select>
<button onclick="guardar()" style="background:#00c853;">💾 Guardar Nuevos</button>
<button onclick="agregarFila()" style="background:#2196f3;">➕</button>
<button onclick="borrarHistorial()" style="background:#f44336;">🗑️</button>
</div>

<h2 style="padding:10px;">📈 REGISTRO KP</h2>

<table id="tabla">
<thead>
<tr>
<th>Img1</th>
<th>Img2</th>
<th>Nombre</th>
<th>Invertido</th>
<th>Venta</th>
<th>Cant</th>
<th>❌</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2 style="padding:10px;">🖼️ Catálogo</h2>
<div id="cat_h" class="galeria"></div>
<div id="cat_m" class="galeria"></div>
<div id="cat_p" class="galeria"></div>
<div id="cat_o" class="galeria"></div>

<script>
const URL="https://script.google.com/macros/s/AKfycbxjZn5aPhLdDEbyHPHep3EeDxEvIKu-gg3o3sXSb0whcWyAR9qwxov8KIC6sUzF91tFww/exec";
const SHEET_PRODUCTOS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vS02ENtcg8PoDQ8rIsUqjDJqXxwbDjsDEOqbSdMAGUIY4U_6ruB1N2M-UcXaWFJbEgZe-J4Yk4asPKP/pub?gid=727495021&single=true&output=csv";

let tabla=document.querySelector("#tabla tbody");
let inputActivo=null;
let filaActiva=null;
let productosKP={}; // mapa: nombre de archivo de imagen -> {nombre, precio}

function parsearCSV(texto){
    const filas = texto.trim().split("\n");
    const encabezados = filas[0].split(",").map(e => e.trim());
    return filas.slice(1).map(fila => {
        const valores = [];
        let actual = "";
        let dentroComillas = false;
        for (let c of fila) {
            if (c === '"') { dentroComillas = !dentroComillas; }
            else if (c === ',' && !dentroComillas) { valores.push(actual.trim()); actual = ""; }
            else { actual += c; }
        }
        valores.push(actual.trim());
        const obj = {};
        encabezados.forEach((enc, i) => obj[enc] = valores[i] || "");
        return obj;
    });
}

function cargarProductosKP(){
    fetch(SHEET_PRODUCTOS_URL)
        .then(res => res.text())
        .then(csv => {
            const productos = parsearCSV(csv);
            productos.forEach(p => {
                if(p.imagen) productosKP[p.imagen.trim()] = p;
            });
        })
        .catch(() => console.error("No se pudieron cargar los precios de KP"));
}

// Saca el nombre de archivo de una URL tipo .../img/relojcurrenh1.jpg -> relojcurrenh1.jpg
function nombreArchivoDeUrl(url){
    if(!url) return "";
    return url.split("/").pop().trim();
}

// Devuelve el precio que realmente se cobra por un producto: si tiene precioRebaja válido
// (igual que la lógica de la tienda KP), usa ese; si no, el precio normal.
function precioVentaReal(p){
    const precioNum = parseInt(p.precio) || 0;
    const tieneRebaja = p.precioRebaja
        && p.precioRebaja.trim() !== ""
        && !isNaN(parseInt(p.precioRebaja))
        && parseInt(p.precioRebaja) > 0
        && parseInt(p.precioRebaja) < precioNum;
    return tieneRebaja ? parseInt(p.precioRebaja) : precioNum;
}

// Recalcula Invertido y Venta de una fila sumando los precios base de Img1 + Img2,
// multiplicado por la Cantidad. Si una imagen no tiene match en el Sheet, no suma nada por ella.
function recalcularFila(f){
    const inputImg1 = f.cells[0].children[0];
    const inputImg2 = f.cells[1].children[0];
    const inputInv = f.cells[3].children[0];
    const inputVen = f.cells[4].children[0];
    const inputCant = f.cells[5].children[0];

    const p1 = productosKP[nombreArchivoDeUrl(inputImg1.value)];
    const p2 = productosKP[nombreArchivoDeUrl(inputImg2.value)];

    // Si ninguna de las dos fotos hace match con un producto del Sheet, dejamos los campos como están
    // (permite seguir usando la fila aunque la foto no esté en el catálogo de KP)
    if(!p1 && !p2) return;

    const cant = Number(inputCant.value) || 1;

    let sumaVenta = 0;
    let sumaCompra = 0;
    let hayCompra = false;

    [p1, p2].forEach(p => {
        if(!p) return;
        sumaVenta += precioVentaReal(p); // ya considera precioRebaja si aplica

        // Si el producto está en oferta (precioRebaja con valor), el costo real
        // también cambia y se debe tomar de precioCompraO en lugar de precioCompra.
        const tieneRebaja = p.precioRebaja
            && p.precioRebaja.trim() !== ""
            && !isNaN(parseInt(p.precioRebaja))
            && parseInt(p.precioRebaja) > 0;

        const compraUsar = tieneRebaja ? p.precioCompraO : p.precioCompra;

        if(compraUsar && compraUsar.trim() !== "" && !isNaN(parseInt(compraUsar))){
            sumaCompra += parseInt(compraUsar);
            hayCompra = true;
        }
    });

    inputVen.value = formatearNumero(sumaVenta * cant);
    if(hayCompra) inputInv.value = formatearNumero(sumaCompra * cant);
}

document.addEventListener("focusin",e=>{
    if(e.target.classList.contains("imginput")){
        inputActivo=e.target;
        filaActiva=e.target.closest("tr");
    }
});

function formatearNumero(valor){
    valor = String(valor).replace(/\./g,"").replace(/\D/g,"");
    return valor.replace(/\B(?=(\d{3})+(?!\d))/g,".");
}

function limpiarNumero(valor){
    return Number(String(valor).replace(/\./g,""));
}

function respaldar(){
    let datos = [];

    for(let f of tabla.rows){
        datos.push({
            i1: f.cells[0].children[0].value,
            i2: f.cells[1].children[0].value,
            nom: f.cells[2].children[0].value,
            inv: f.cells[3].children[0].value,
            ven: f.cells[4].children[0].value,
            can: f.cells[5].children[0].value,
            est: f.classList.contains("enviado")
        });
    }

    let mes = document.getElementById("mes").value;
    let anio = document.getElementById("anio").value;
    localStorage.setItem(
    "kp_historial_" + anio + "_" + mes,
    JSON.stringify(datos)
);
}

function cargar(){
    let mes = document.getElementById("mes").value;
    let anio = document.getElementById("anio").value;

    let historial = localStorage.getItem(
        "kp_historial_" + anio + "_" + mes
    );

    tabla.innerHTML = "";

    if(historial){
        JSON.parse(historial).forEach(d => agregarFila(d));
    }else{
        agregarFila();
    }
}


function agregarFila(d = null){
    let f=tabla.insertRow();
    if(d && d.est) f.classList.add("enviado");

    f.innerHTML=`
        <td><input class="imginput" value="${d?d.i1:''}"><br><img src="${d?d.i1:''}"></td>
        <td><input class="imginput" value="${d?d.i2:''}"><br><img src="${d?d.i2:''}"></td>
        <td><input placeholder="Nombre" value="${d?d.nom:''}" oninput="respaldar()"></td>
        <td><input class="numero" placeholder="Invertido" value="${d?d.inv:''}" oninput="respaldar()"></td>
        <td><input class="numero" placeholder="Venta" value="${d?d.ven:''}" oninput="respaldar()"></td>
        <td><input type="number" value="${d?d.can:'1'}" oninput="respaldar()"></td>
        <td><button onclick="eliminarFila(this)" style="background:#f44336;">🗑️</button></td>
        
    `;

    // 🔥 Arreglo para que las fotos carguen al escribir o elegir del catálogo
    f.querySelectorAll(".imginput").forEach((inp,i)=>{
        inp.oninput=e=>{
            f.querySelectorAll("img")[i].src=e.target.value;
            respaldar();
        };
    });

    f.querySelectorAll(".numero").forEach(inp=>{
        inp.oninput=e=>{
            e.target.value = formatearNumero(e.target.value);
            respaldar();
        };
    });

    const inputCant = f.cells[5].children[0];
    inputCant.addEventListener("input", () => {
        recalcularFila(f);
        respaldar();
    });
}

function guardar(){
    let productos = [];
    let filasNuevas = [];

    for(let f of tabla.rows){
        if(f.classList.contains("enviado")) continue;

        let nombre = f.cells[2].children[0].value;
        if(!nombre) continue;

        let inv = limpiarNumero(f.cells[3].children[0].value);
        let ven = limpiarNumero(f.cells[4].children[0].value);
        let cant = Number(f.cells[5].children[0].value);

        let totalInv = inv * cant;
        let totalVen = ven * cant;
        let ganancia = totalVen - totalInv;
        let porcentaje = (totalVen === 0) ? 0 : ((ganancia / totalVen) * 100).toFixed(1);

        productos.push([
            f.cells[0].children[0].value, f.cells[1].children[0].value, 
            nombre, document.getElementById("mes").value,
            totalInv, totalVen, ganancia, porcentaje + "%"
        ]);
        filasNuevas.push(f);
    }

    if(productos.length === 0) return alert("No hay nada nuevo");

    fetch(URL, {
        method: "POST",
        mode: "no-cors", 
        body: JSON.stringify({ "datos": productos })
    })
    .then(() => {
        alert("¡Guardado en Sheets! 🔥");
        filasNuevas.forEach(f => f.classList.add("enviado"));
        respaldar();
    })
    .catch(() => alert("Error ❌"));
}

function eliminarFila(btn){
    if(confirm("¿Eliminar esta compra?")){
        btn.closest("tr").remove();

        if(tabla.rows.length === 0){
            agregarFila();
        }

        respaldar();
    }
}

function borrarHistorial(){
    let mes = document.getElementById("mes").value;
    let anio = document.getElementById("anio").value;

    if(confirm("¿Borrar todo " + mes + " " + anio + "?")){
        localStorage.removeItem(
            "kp_historial_" + anio + "_" + mes
        );

        tabla.innerHTML = "";
        agregarFila();
    }
}

fetch("https://api.github.com/repos/kaleth77/kpreloj/contents/img")
.then(res=>res.json()).then(data=>{
    data.forEach(file=>{
        if(file.type==="file"){
            let url=file.download_url;
            let img=document.createElement("img");
            img.src=url;
            img.onclick=()=>{
                if(inputActivo){
                    inputActivo.value=url;
                    inputActivo.dispatchEvent(new Event("input"));

                    // Autocompletar nombre (solo si está vacío) y recalcular Invertido/Venta
                    let producto = productosKP[file.name.trim()];
                    if(producto && filaActiva){
                        let inputNombre = filaActiva.cells[2].children[0];
                        if(inputNombre && !inputNombre.value) inputNombre.value = producto.nombre;
                    }
                    if(filaActiva){
                        recalcularFila(filaActiva);
                        respaldar();
                    }
                }
            };
            let cat = "cat_o";
            if(file.name.includes("h")) cat="cat_h";
            else if(file.name.includes("m")) cat="cat_m";
            else if(file.name.includes("p")) cat="cat_p";
            document.getElementById(cat).appendChild(img);
        }
    });
});
    const meses = [
"Enero","Febrero","Marzo","Abril",
"Mayo","Junio","Julio","Agosto",
"Septiembre","Octubre","Noviembre","Diciembre"
];

document.getElementById("mes").value = meses[new Date().getMonth()];
document.getElementById("anio").value =
new Date().getFullYear();
document.getElementById("mes").addEventListener("change", cargar);
document.getElementById("anio").addEventListener("change", cargar);

cargarProductosKP();
cargar();
</script>
</body>
</html>
