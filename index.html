<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabla CUENTAS</title>

<style>
body{font-family:Arial;margin:0;padding:10px;background:#0f0f0f;color:white;}
h2{text-align:center;font-size:18px;}
select{width:100%;padding:10px;background:#1a1a1a;color:white;border:none;border-radius:8px;margin-bottom:10px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th,td{border:1px solid #333;padding:5px;text-align:center;}
th{background:#1e1e1e;}
input{width:100%;padding:5px;background:#1a1a1a;color:white;border:none;}
button{width:100%;padding:12px;margin-top:10px;background:#00c853;border:none;color:white;font-weight:bold;border-radius:8px;}
.resumen{margin-top:10px;background:#000;padding:10px;border-radius:8px;}
</style>
</head>

<body>

<select id="selectorMes">
<option value="enero">Enero</option>
<option value="febrero">Febrero</option>
<option value="marzo">Marzo</option>
<option value="abril">Abril</option>
<option value="mayo">Mayo</option>
<option value="junio">Junio</option>
<option value="julio">Julio</option>
<option value="agosto">Agosto</option>
<option value="septiembre">Septiembre</option>
<option value="octubre">Octubre</option>
<option value="noviembre">Noviembre</option>
<option value="diciembre">Diciembre</option>
</select>

<h2>📈 TABLA DE CUENTAS</h2>

<table id="tabla">
<thead>
<tr>
<th>Producto</th>
<th>Costo</th>
<th>Venta</th>
<th>Ganancia</th>
<th>Cant</th>
<th>Total</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button onclick="agregarFila()">➕ Agregar</button>

<div class="resumen">
<div>Invertido: <span id="capInvertido">0</span></div>
<div>Total: <span id="capTotal">0</span></div>
<div>Ganancia: <span id="gananciaGeneral">0</span></div>
<div>%: <span id="porcentaje">0%</span></div>
</div>

<input type="text" id="nombreInput" placeholder="Nombre">
<button onclick="guardar()">Guardar en la nube ☁️</button>

<script>
const URL="https://script.google.com/macros/s/AKfycbzYLP0nitSFnqpR_6eWFfSEraVlOBDG6wOlgaZ-_x19uTmqCztPJJsmdFjnOUwDK5nNSw/exec";

let tabla=document.querySelector("#tabla tbody");
let mesActual=selectorMes.value;

function limpiar(v){return parseFloat((v||"").toString().replace(/\./g,''))||0;}

function agregarFila(d={}){
let f=tabla.insertRow();

f.innerHTML=`
<td><input value="${d.nombre||''}"></td>
<td><input value="${d.costo||''}"></td>
<td><input value="${d.venta||''}"></td>
<td class="ganancia">0</td>
<td><input type="number" value="${d.cantidad||1}"></td>
<td class="total">0</td>
`;

f.querySelectorAll("input").forEach(i=>{
i.oninput=()=>calcFila(f);
});

calcFila(f);
}

function calcFila(f){
let c=limpiar(f.cells[1].children[0].value);
let v=limpiar(f.cells[2].children[0].value);
let n=parseInt(f.cells[4].children[0].value)||0;

let g=v-c;
let t=g*n;

f.querySelector(".ganancia").innerText=g;
f.querySelector(".total").innerText=t;

calcResumen();
}

function calcResumen(){
let ci=0,ct=0,gg=0;

for(let f of tabla.rows){
let c=limpiar(f.cells[1].children[0].value);
let v=limpiar(f.cells[2].children[0].value);
let n=parseInt(f.cells[4].children[0].value)||0;

ci+=c*n;
ct+=v*n;
gg+=(v-c)*n;
}

capInvertido.innerText=ci;
capTotal.innerText=ct;
gananciaGeneral.innerText=gg;
porcentaje.innerText=ci?((gg/ci)*100).toFixed(2)+"%":"0%";
}

function guardar(){

let productos=[];

for(let f of tabla.rows){
productos.push({
nombre:f.cells[0].children[0].value,
costo:f.cells[1].children[0].value,
venta:f.cells[2].children[0].value,
cantidad:f.cells[4].children[0].value
});
}

let datos={
nombre:nombreInput.value,
mes:mesActual,
productos:productos,
invertido:capInvertido.innerText,
total:capTotal.innerText,
ganancia:gananciaGeneral.innerText
};

fetch(URL,{
method:"POST",
body:JSON.stringify(datos)
});

alert("Guardado 🔥");
}

function cargar(){
fetch(URL)
.then(r=>r.json())
.then(data=>{
tabla.innerHTML="";

let registros=data.filter(x=>x[2]===mesActual);

if(registros.length){
let ultimo=registros[registros.length-1];

nombreInput.value=ultimo[1];
}else{
agregarFila();
}
});
}

selectorMes.onchange=()=>{
mesActual=selectorMes.value;
cargar();
};

cargar();
</script>

</body>
</html>
